<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/product-detail.css">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="container">
            <div class="logo"><img src="../logo.png" alt="塞北仙翁" height="50"></div>
            <nav class="nav">
                <ul>
                    <li><a href="../index.html#home">首页</a></li>
                    <li><a href="../index.html#about">关于我们</a></li>
                    <li><a href="../index.html#products">商品展示</a></li>
                    <li><a href="../index.html#certificates">检测报告</a></li>
                    <li><a href="../index.html#contact">联系我们</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 商品详情 -->
    <section class="product-detail">
        <div class="container">
            <a href="../index.html" class="back-link">← 返回商品列表</a>
            <div class="product-detail-content">
                <div class="product-detail-image">
                    <div class="carousel-container" id="productCarousel">
                        <div class="carousel-track" id="productTrack">
                            <!-- 轮播图将通过JavaScript动态生成 -->
                        </div>
                        <div class="carousel-indicators" id="productIndicators"></div>
                    </div>
                </div>
                <div class="product-detail-info">
                    <h1 id="productName"></h1>
                    <div class="price" id="productPrice"></div>
                    <div class="description" id="productDescription"></div>
                    
                    <div class="features">
                        <h3>商品特点</h3>
                        <ul id="featuresList">
                            <!-- 特点列表将通过JavaScript动态生成 -->
                        </ul>
                    </div>
                    
                    <div class="quantity">
                        <label for="productQuantity">购买数量：</label>
                        <input type="number" id="productQuantity" value="1" min="1" max="100">
                    </div>
                    
                    <div class="actions">
                        <button class="btn-primary" onclick="addToCart()">立即购买</button>
                        <button class="btn-secondary" onclick="addToWishlist()">加入收藏</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">企业名称</div>
                <div class="footer-links">
                    <ul>
                        <li><a href="../index.html">首页</a></li>
                        <li><a href="../index.html#about">关于我们</a></li>
                        <li><a href="../index.html#products">商品展示</a></li>
                        <li><a href="../index.html#certificates">检测报告</a></li>
                        <li><a href="../index.html#contact">联系我们</a></li>
                    </ul>
                </div>
                <div class="footer-copyright">
                    <p>&copy; 2026 企业名称. 保留所有权利.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="../js/product-detail.js"></script>
</body>
</html>
