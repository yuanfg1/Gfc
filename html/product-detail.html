<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/product-detail.css">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        
    </header>

    <!-- 商品详情 -->
    <section class="product-detail">
        <div class="container">
            <div class="product-detail-content">
                <div class="product-detail-image">
                    <div class="carousel-container" id="productCarousel">
                        <div class="carousel-track" id="productTrack">
                            <!-- 轮播图将通过JavaScript动态生成 -->
                        </div>
                        <div class="carousel-indicators" id="productIndicators"></div>
                    </div>
                </div>
                <div class="product-detail-info">
                    <h1 id="productName"></h1>
                    <div class="price" id="productPrice"></div>
                    <div class="description" id="productDescription"></div>
                    
                    <div class="features">
                        <h3>商品特点</h3>
                        <ul id="featuresList">
                            <!-- 特点列表将通过JavaScript动态生成 -->
                        </ul>
                    </div>
                    
                    <div class="quantity">
                    </div>
                    
                    <div class="actions">
                        <button class="btn-primary" onclick="addToCart()">立即购买</button>
                    </div>
                </div>
            </div>
            
            <!-- 山茶油的吃法 -->
            <div class="product-usage">
                <h2 class="section-title">山茶油的吃法</h2>
                <div class="usage-content" id="usageContent">
                    <!-- 内容将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/product-detail.js"></script>
</body>
</html>
