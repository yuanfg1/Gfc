<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="product-detail.css">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="container">
            <div class="logo">企业名称</div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="index.html#about">关于我们</a></li>
                    <li><a href="index.html#products">商品展示</a></li>
                    <li><a href="index.html#certificates">证书展示</a></li>
                    <li><a href="index.html#contact">联系我们</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 商品详情 -->
    <section class="product-detail">
        <div class="container">
            <a href="index.html#products" class="back-link">← 返回商品列表</a>
            <div class="product-detail-content">
                <div class="product-detail-image">
                    <img id="productImage" src="" alt="商品图片">
                </div>
                <div class="product-detail-info">
                    <h1 id="productName"></h1>
                    <div class="price" id="productPrice"></div>
                    <div class="description" id="productDescription"></div>
                    
                    <div class="features">
                        <h3>商品特点</h3>
                        <ul id="featuresList">
                            <!-- 特点列表将通过JavaScript动态生成 -->
                        </ul>
                    </div>
                    
                    <div class="quantity">
                        <label for="productQuantity">购买数量：</label>
                        <input type="number" id="productQuantity" value="1" min="1" max="100">
                    </div>
                    
                    <div class="actions">
                        <button class="btn-primary" onclick="addToCart()">立即购买</button>
                        <button class="btn-secondary" onclick="addToWishlist()">加入收藏</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">企业名称</div>
                <div class="footer-links">
                    <ul>
                        <li><a href="index.html">首页</a></li>
                        <li><a href="index.html#about">关于我们</a></li>
                        <li><a href="index.html#products">商品展示</a></li>
                        <li><a href="index.html#certificates">证书展示</a></li>
                        <li><a href="index.html#contact">联系我们</a></li>
                    </ul>
                </div>
                <div class="footer-copyright">
                    <p>&copy; 2026 企业名称. 保留所有权利.</p>
                </div>
            </div>
        </div>
    </footer>

    <script type="module">
        // 导入商品数据
        import { products } from './pro.js';

        // 获取URL参数
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // 渲染商品详情
        function renderProductDetail() {
            // 从URL获取商品ID
            const productId = parseInt(getUrlParameter('id'));
            
            // 查找对应的商品
            const product = products.find(p => p.id === productId);
            
            if (product) {
                // 设置商品信息
                document.getElementById('productName').textContent = product.name;
                document.getElementById('productPrice').textContent = product.price;
                document.getElementById('productDescription').textContent = product.description;
                document.getElementById('productImage').src = product.image;
                
                // 渲染商品特点
                const featuresList = document.getElementById('featuresList');
                featuresList.innerHTML = '';
                
                product.features.forEach(feature => {
                    const listItem = document.createElement('li');
                    listItem.textContent = feature;
                    featuresList.appendChild(listItem);
                });
            } else {
                // 如果未找到商品，显示提示信息
                document.getElementById('productName').textContent = '商品不存在';
                document.getElementById('productPrice').textContent = '';
                document.getElementById('productDescription').textContent = '抱歉，未找到该商品的详细信息。';
                document.getElementById('productImage').src = '商品图库/default.jpg';
            }
        }

        // 页面加载时渲染商品详情
        document.addEventListener('DOMContentLoaded', renderProductDetail);
    </script>
</body>
</html>
