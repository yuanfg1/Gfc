<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一级纯菜籽油 - 商品详情</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="product-detail.css">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="container">
            <div class="logo"><img src="logo.png" alt="塞北仙翁" height="50"></div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html#home">首页</a></li>
                    <li><a href="index.html#about">关于我们</a></li>
                    <li><a href="index.html#products">商品展示</a></li>
                    <li><a href="index.html#certificates">检测报告</a></li>
                    <li><a href="index.html#contact">联系我们</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 商品详情 -->
    <section class="product-detail">
        <div class="container">
            <a href="./index.html" class="back-link">← 返回商品列表</a>
            <div class="product-detail-content">
                <div class="product-detail-image">
                    <img id="productImage" src="轮播图库/3.jpg" alt="一级纯菜籽油">
                </div>
                <div class="product-detail-info">
                    <h1 id="productName">一级纯菜籽油</h1>
                    <div class="price" id="productPrice">¥99.00</div>
                    <div class="description" id="productDescription">这是一款高品质的一级纯菜籽油，采用优质材料制作，工艺精湛，设计时尚。无论是日常使用还是送礼都是不错的选择。我们注重每一个细节，确保产品质量达到最高标准。</div>
                    
                    <div class="features">
                        <h3>商品特点</h3>
                        <ul id="featuresList">
                            <li>非转基因，安全健康</li>
                            <li>物理压榨，保留原香</li>
                            <li>烟点高，适合多种烹饪方式</li>
                            <li>富含维生素E，营养丰富</li>
                            <li>严格质检，品质保证</li>
                        </ul>
                    </div>
                    
                    <div class="quantity">
                        <label for="productQuantity">购买数量：</label>
                        <input type="number" id="productQuantity" value="1" min="1" max="100">
                    </div>
                    
                    <div class="actions">
                        <button class="btn-primary" onclick="addToCart()">立即购买</button>
                        <button class="btn-secondary" onclick="addToWishlist()">加入收藏</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">企业名称</div>
                <div class="footer-links">
                    <ul>
                        <li><a href="index.html">首页</a></li>
                        <li><a href="index.html#about">关于我们</a></li>
                        <li><a href="index.html#products">商品展示</a></li>
                        <li><a href="index.html#certificates">检测报告</a></li>
                        <li><a href="index.html#contact">联系我们</a></li>
                    </ul>
                </div>
                <div class="footer-copyright">
                    <p>&copy; 2026 企业名称. 保留所有权利.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // 模拟添加到购物车
        function addToCart() {
            alert('商品已添加到购物车！');
        }
        
        // 模拟加入收藏
        function addToWishlist() {
            alert('商品已加入收藏！');
        }
    </script>
</body>
</html>
