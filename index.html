<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塞北仙翁</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        
    </header>

    <section id="home" class="hero">
        <!-- 轮播图容器 -->
        <div class="carousel-container" id="carousel">
            <!-- 图片轨道 -->
            <div class="carousel-track" id="track">
                <!-- 幻灯片将通过JavaScript动态生成 -->
            </div>
            <!-- 指示器 -->
            <div class="carousel-indicators" id="indicators"></div>
        </div>
    </section>

    <!-- 公告栏 -->
    <section class="announcement">
        <div class="container">
            <div class="announcement-header">
                <div class="announcement-tabs">
                    <span >公告</span>
                </div>
            </div>
            <div class="announcement-list">
                <ul id="announcementList"></ul>
            </div>
        </div>
    </section>
    <!-- 关于我们 -->
    <section id="about" class="about">
        <div class="container">
            <h2 class="section-title"></h2>
            <div class="about-content">
                <div class="about-text">
                    <!-- 内容将通过JavaScript动态生成 -->
                </div>
                <div class="about-image">
                    <div class="about-carousel-container">
                        <div class="about-carousel-track">
                            <!-- 幻灯片将通过JavaScript动态生成 -->
                        </div>
                        <div class="about-carousel-indicators"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 商品展示 -->
    <section id="products" class="products">
        <div class="container">
            <h2 class="section-title">商品展示</h2>
            <div class="products-grid" id="productsGrid">
                <!-- 商品将通过JavaScript动态生成 -->
            </div>
        </div>
    </section>

    <!-- 检测报告 -->
    <section id="certificates" class="certificates">
        <div class="container">
            <h2 class="section-title">检测报告</h2>
            <div class="certificates-grid" id="certificatesGrid">
                <!-- 检测报告将通过JavaScript动态生成 -->
            </div>
        </div>
    </section>

    <!-- 联系我们 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2 class="section-title">联系我们</h2>
            <div class="contact-content">
                <div class="contact-info">
                    <p><strong>地址：</strong>四川省宜宾市筠连县大雪山镇高峰村村民委员会</p>
                    <p><strong>电话：</strong>010-12345678</p>
                    <p><strong>邮箱：</strong>gfcsmyxgs@163.com</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        
    </footer>
    
    <script src="./js/data.js"></script>
    <script src="./js/index.js"></script>
</body>
</html>
